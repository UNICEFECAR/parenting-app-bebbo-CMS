            value: '<div class="block-download-doubl-heart scroll-menu" id="download"><drupal-media data-entity-type="media" data-entity-uuid="017fc30f-8d4c-4fe2-8ebb-9cfb347e44a1" data-align="center">&nbsp;</drupal-media></div><div class="block-download-text">Since its launch in 2021, UNICEF''s parenting app Bebbo has become one of the most trusted sources of advice for parents globally. Started in Europe and Central Asia and currently localized in 15 languages (<em>English, Русский, Shqip, Беларуская мова, Български, Ελληνικά, Кыргызча, Crnogorski, Македонски, Română, Srpski, Slovenčina, Тоҷикӣ, Робота, O‘zbekcha</em>), Bebbo offers parents of young children expert advice and tools on young child development - from health and nutrition, care for the newborn to safety and parental wellbeing. The Bebbo app is a parenting innovation, <span>recognized as </span><a href="https://app.digitalpublicgoods.net/a/11084"><span>a Digital Public Good</span></a><span>, </span>available to parents online and offline. Stay tuned for more news about new countries launching Bebbo!</div><div class="block-download-doubl-heart scroll-menu"><drupal-media data-entity-type="media" data-entity-uuid="c1cd83ee-5d48-4f7a-a9d1-6b5d6c130d68" data-align="center">&nbsp;</drupal-media></div><div class="block-download-text">Bebbo was honored with the Silver Award in the Technology for Good category at the Global Good Awards 2024, recognizing its positive impact. Additionally, the Bebbo parenting app has been named one of the top 100 innovations to watch in the <a href="https://hundred.org/en/reports/hundred-global-collection-2025">HundrED Global Collection for 2025</a>, underscoring its growing influence in parenting support for children’s education. UNICEF Kyrgyzstan received the prestigious <a href="https://shortyawards.com/9th-impact/becoming-better-parents-with-bebbo">GoldHonour Shorty Impact Award</a> for its partnership with the National Television to create a TV series for parents inspired by the Bebbo parenting app.&nbsp;&nbsp;</div><div class="block-download-doubl-heart scroll-menu"><drupal-media data-entity-type="media" data-entity-uuid="6606054c-f543-4baf-954a-a87b99c885c5" data-align="center">&nbsp;</drupal-media></div>'
